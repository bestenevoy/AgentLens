name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            artifact_name: openaimock-windows-amd64.exe
            binary_name: openaimock.exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            artifact_name: openaimock-linux-amd64
            binary_name: openaimock
          - os: darwin
            arch: amd64
            runner: macos-15-intel
            artifact_name: openaimock-darwin-amd64
            binary_name: openaimock
          - os: darwin
            arch: arm64
            runner: macos-latest
            artifact_name: openaimock-darwin-arm64
            binary_name: openaimock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.binary_name }} .

      - name: Rename
        shell: bash
        run: |
          if [ "${{ matrix.os }}" != "windows" ]; then
            chmod +x ${{ matrix.binary_name }}
          fi
          mv ${{ matrix.binary_name }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
