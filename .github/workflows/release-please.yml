name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go
          changelog-types: |
            [
              { "type": "feat",     "section": "✨ 新功能",     "hidden": false },
              { "type": "fix",      "section": "🐛 Bug 修复",   "hidden": false },
              { "type": "perf",     "section": "⚡ 性能优化",   "hidden": false },
              { "type": "refactor", "section": "♻️ 重构",       "hidden": false },
              { "type": "ci",       "section": "🔧 CI/CD",     "hidden": false },
              { "type": "docs",     "section": "📝 文档",       "hidden": false },
              { "type": "chore",    "section": "📦 其他",       "hidden": false },
              { "type": "build",    "section": "📦 构建",       "hidden": false },
              { "type": "style",    "section": "📦 其他",       "hidden": true  },
              { "type": "test",     "section": "📦 其他",       "hidden": true  }
            ]
