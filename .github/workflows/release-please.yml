name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: go
          changelog-types: |
            [
              { "type": "feat",     "section": "✨ 新功能",     "hidden": false },
              { "type": "fix",      "section": "🐛 Bug 修复",   "hidden": false },
              { "type": "perf",     "section": "⚡ 性能优化",   "hidden": false },
              { "type": "refactor", "section": "♻️ 重构",       "hidden": false },
              { "type": "ci",       "section": "🔧 CI/CD",     "hidden": false },
              { "type": "docs",     "section": "📝 文档",       "hidden": false },
              { "type": "chore",    "section": "📦 其他",       "hidden": false },
              { "type": "build",    "section": "📦 构建",       "hidden": false },
              { "type": "style",    "section": "📦 其他",       "hidden": true  },
              { "type": "test",     "section": "📦 其他",       "hidden": true  }
            ]

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            artifact_name: agentlens-windows-amd64.exe
            binary_name: agentlens.exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            artifact_name: agentlens-linux-amd64
            binary_name: agentlens
          - os: darwin
            arch: amd64
            runner: macos-15-intel
            artifact_name: agentlens-darwin-amd64
            binary_name: agentlens
          - os: darwin
            arch: arm64
            runner: macos-latest
            artifact_name: agentlens-darwin-arm64
            binary_name: agentlens

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.binary_name }} .

      - name: Rename
        shell: bash
        run: |
          if [ "${{ matrix.os }}" != "windows" ]; then
            chmod +x ${{ matrix.binary_name }}
          fi
          mv ${{ matrix.binary_name }} ${{ matrix.artifact_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ matrix.artifact_name }}
