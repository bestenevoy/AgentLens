<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OpenAI Mock · Inspector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1115; color: #e4e6eb; font-size: 13px;
      height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 8px 16px; background: #1a1d24; border-bottom: 1px solid #2a2f3a;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 14px; font-weight: 600; color: #7dd3fc; white-space: nowrap; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    label { display: inline-flex; gap: 4px; align-items: center; font-size: 12px; }
    select, input[type="text"], input[type="password"] {
      background: #0f1115; color: #e4e6eb; border: 1px solid #2a2f3a;
      padding: 3px 8px; border-radius: 3px; font-size: 12px;
    }
    button {
      background: #2a2f3a; color: #e4e6eb; border: 1px solid #3a3f4a;
      padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: #3a3f4a; }
    button.primary { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    button.danger { background: #ef4444; border-color: #ef4444; color: #fff; }
    button.small { padding: 2px 6px; font-size: 11px; }
    main { flex: 1; display: flex; overflow: hidden; }
    aside { width: 300px; border-right: 1px solid #2a2f3a; overflow-y: auto; background: #14171d; }
    .req-item { padding: 8px 12px; border-bottom: 1px solid #1f232c; cursor: pointer; }
    .req-item:hover { background: #1a1d24; }
    .req-item.active { background: #1e293b; border-left: 3px solid #3b82f6; }
    .req-item .row1 { display: flex; justify-content: space-between; gap: 6px; }
    .req-item .model { font-weight: 600; color: #c4e7d4; font-size: 12px; }
    .req-item .time { color: #6b7280; font-size: 11px; }
    .req-item .meta { margin-top: 3px; display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { padding: 1px 5px; border-radius: 2px; font-size: 10px; background: #2a2f3a; color: #9ca3af; }
    .tag.mock { background: #1e3a5f; color: #7dd3fc; }
    .tag.custom { background: #3b2f1a; color: #fbbf24; }
    .tag.proxy { background: #1a3a2a; color: #4ade80; }
    .tag.error { background: #3a1a1a; color: #f87171; }
    section.detail { flex: 1; overflow-y: auto; padding: 14px; }
    .empty { color: #6b7280; padding: 40px; text-align: center; }
    pre {
      background: #0a0c10; border: 1px solid #1f232c; border-radius: 4px;
      padding: 8px; overflow-x: auto;
      font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 12px; white-space: pre-wrap; word-break: break-word;
    }

    /* Block + collapse */
    .block { margin-bottom: 16px; }
    .block h3 {
      font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
    }
    .block h3 .hash { color: #fbbf24; font-family: monospace; text-transform: none; }
    .block[data-view="human"] .block-json { display: none; }
    .block[data-view="json"] .block-human { display: none; }
    .view-toggle { margin-left: auto; font-size: 10px; padding: 1px 6px; }
    .caret { display: inline-block; width: 10px; transition: transform 0.15s; color: #6b7280; }
    .block.collapsed .block-body { display: none; }
    .block.collapsed .caret { transform: rotate(-90deg); }
    .block-summary { color: #6b7280; font-size: 11px; font-weight: normal; text-transform: none; letter-spacing: 0; margin-left: 4px; }
    .block:not(.collapsed) .block-summary { display: none; }
    .block.collapsed .view-toggle { display: none; }

    /* Message card */
    .msg-card {
      border: 1px solid #1f232c; border-radius: 4px; padding: 8px;
      margin-bottom: 6px; background: #0f1217; cursor: pointer;
    }
    .msg-card.role-user { border-left: 3px solid #7dd3fc; }
    .msg-card.role-assistant { border-left: 3px solid #4ade80; }
    .msg-card.role-system { border-left: 3px solid #fbbf24; }
    .msg-card.role-tool { border-left: 3px solid #f472b6; }
    .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; user-select: none; }
    .role-badge { padding: 1px 6px; border-radius: 2px; font-size: 11px; font-weight: 600; }
    .role-badge.role-user { background: #1e3a5f; color: #7dd3fc; }
    .role-badge.role-assistant { background: #1a3a2a; color: #4ade80; }
    .role-badge.role-system { background: #3b2f1a; color: #fbbf24; }
    .role-badge.role-tool { background: #3a1a2f; color: #f472b6; }
    .msg-index { color: #6b7280; font-size: 10px; }
    .msg-content {
      padding: 4px 0; white-space: pre-wrap; word-break: break-word;
      line-height: 1.5; color: #d1d5db;
    }
    .msg-card.collapsed .msg-body { display: none; }
    .msg-summary { color: #6b7280; font-size: 12px; font-style: italic; }
    .msg-card:not(.collapsed) .msg-summary { display: none; }
    .msg-caret { color: #6b7280; font-size: 10px; transition: transform 0.15s; }
    .msg-card.collapsed .msg-caret { transform: rotate(-90deg); }

    /* Direction arrow: ↑ = to LLM (upstream), ↓ = from LLM (downstream) */
    .dir-arrow {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%; font-size: 10px; font-weight: bold;
    }
    .dir-arrow.up { background: #1e3a5f; color: #7dd3fc; }   /* ↑ 发给 LLM */
    .dir-arrow.down { background: #1a3a2a; color: #4ade80; }  /* ↓ LLM 返回 */

    .tool-result-meta { margin-top: 4px; font-size: 11px; color: #f472b6; }
    .tool-result-meta code { background: #1a1d24; padding: 1px 4px; border-radius: 2px; }

    /* Tool call (inside assistant message) */
    .tool-call-card {
      margin-top: 6px; padding: 6px 8px; background: #12161e;
      border: 1px solid #1f232c; border-radius: 4px;
    }
    .tool-call-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .tool-call-name { color: #4ade80; font-weight: 600; font-size: 12px; }
    .tool-call-id { color: #6b7280; font-size: 10px; }
    .arg-row { font-size: 12px; padding: 1px 0; }
    .arg-key { color: #fbbf24; }
    .arg-val { color: #d1d5db; }

    /* Tool definition card */
    .tool-card {
      border: 1px solid #1f232c; border-radius: 4px; padding: 8px;
      margin-bottom: 6px; background: #0f1217; border-left: 3px solid #a78bfa;
    }
    .tool-card-name { color: #a78bfa; font-weight: 600; font-size: 13px; margin-bottom: 2px; }
    .tool-card-desc { color: #9ca3af; font-size: 12px; margin-bottom: 6px; }
    .param-row { padding: 2px 0; font-size: 12px; display: flex; gap: 6px; align-items: baseline; }
    .param-name { color: #fbbf24; min-width: 80px; }
    .param-type { color: #7dd3fc; font-size: 11px; }
    .param-req { color: #f87171; font-size: 10px; padding: 0 4px; border: 1px solid #f8717140; border-radius: 2px; }
    .param-desc { color: #6b7280; }

    /* Response */
    .response-card {
      border: 1px solid #1f232c; border-radius: 4px; padding: 8px;
      background: #0f1217; border-left: 3px solid #4ade80;
    }
    .finish-reason { color: #6b7280; font-size: 11px; margin-left: auto; }
    .usage { margin-top: 6px; font-size: 11px; color: #6b7280; }
    .error-box { padding: 8px; background: #3a1a1a; border: 1px solid #f8717140; border-radius: 4px; color: #f87171; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 8px;
      padding: 16px; width: 560px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
    }
    .modal h2 { font-size: 14px; margin-bottom: 12px; }
    .modal fieldset { border: 1px solid #2a2f3a; padding: 10px; margin-bottom: 10px; }
    .modal legend { padding: 0 6px; color: #9ca3af; font-size: 11px; }
    .modal .row { margin-bottom: 8px; display: flex; flex-direction: column; gap: 3px; }
    .modal label { font-size: 11px; color: #9ca3af; }
    .modal input[type="text"], .modal input[type="password"] { width: 100%; }
    .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
    textarea.editor {
      width: 100%; min-height: 240px; background: #0a0c10; color: #e4e6eb;
      border: 1px solid #1f232c; border-radius: 4px; padding: 8px;
      font-family: "Cascadia Code", Consolas, monospace; font-size: 12px; resize: vertical;
    }
    .toast {
      position: fixed; bottom: 20px; right: 20px; background: #1e293b;
      border-left: 3px solid #4ade80; padding: 8px 14px; border-radius: 4px;
      animation: fadein 0.2s; z-index: 200;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; } }

    .provider-list { margin-bottom: 10px; }
    .provider-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      border: 1px solid #1f232c; border-radius: 4px; margin-bottom: 4px;
    }
    .provider-item.selected { border-color: #3b82f6; background: #1e293b; }
    .provider-item .name { font-weight: 600; color: #7dd3fc; }
    .provider-item .url { color: #6b7280; font-size: 11px; flex: 1; }
    .provider-item .actions { display: flex; gap: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>OpenAI Mock Inspector</h1>
    <div class="controls">
      <label>模式:
        <select id="mode">
          <option value="mock">mock</option>
          <option value="proxy">proxy</option>
        </select>
      </label>
      <label id="provider-label" style="display:none">Provider:
        <select id="provider-select"><option value="">(未选择)</option></select>
      </label>
      <button id="manage-providers-btn">管理 Provider</button>
      <label><input type="checkbox" id="auto-refresh" checked> 自动</label>
      <button id="refresh-btn">刷新</button>
      <button id="clear-btn" class="danger small">清空</button>
    </div>
  </header>

  <main>
    <aside id="list"></aside>
    <section class="detail" id="detail">
      <div class="empty">选择左侧的请求查看详情</div>
    </section>
  </main>

  <!-- Provider 管理 -->
  <div class="modal-backdrop" id="provider-modal">
    <div class="modal">
      <h2>Provider 管理</h2>
      <div class="provider-list" id="provider-list"></div>
      <fieldset>
        <legend id="provider-form-title">新增 Provider</legend>
        <input type="hidden" id="prov-id">
        <div class="row"><label>名称</label><input type="text" id="prov-name" placeholder="如 OpenAI / DeepSeek"></div>
        <div class="row"><label>Base URL</label><input type="text" id="prov-base-url" placeholder="https://api.openai.com/v1"></div>
        <div class="row"><label>API Key</label><input type="password" id="prov-api-key" placeholder="sk-..."></div>
        <div class="row"><label>Override Model（留空保持原样）</label><input type="text" id="prov-override-model" placeholder="如 gpt-4o-mini"></div>
        <div class="row"><label><input type="checkbox" id="prov-passthrough"> 透传客户端原始 Authorization</label></div>
        <div class="actions">
          <button id="prov-cancel">取消</button>
          <button id="prov-save" class="primary">保存</button>
        </div>
      </fieldset>
    </div>
  </div>

  <!-- 自定义响应编辑器 -->
  <div class="modal-backdrop" id="custom-modal">
    <div class="modal">
      <h2>自定义响应 <span id="custom-hash" style="color:#fbbf24;font-family:monospace"></span></h2>
      <p style="color:#9ca3af;font-size:12px;margin-bottom:8px">
        相同 hash 的后续请求会直接返回这里设置的响应（优先级最高）。
      </p>
      <textarea class="editor" id="custom-editor"></textarea>
      <div class="actions">
        <button id="custom-fill-mock">用当前响应填充</button>
        <button id="custom-delete" class="danger">删除自定义</button>
        <button id="custom-cancel">取消</button>
        <button id="custom-save" class="primary">保存</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/admin/api';
    let currentId = null;
    let currentRecord = null;
    let timer = null;
    let config = { mode: 'mock', selected_provider_id: null, providers: [] };

    const $ = id => document.getElementById(id);
    const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    function toast(msg, ok=true) {
      const t = document.createElement('div');
      t.className = 'toast';
      if (!ok) t.style.borderLeftColor = '#f87171';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    async function api(path, opts={}) {
      const r = await fetch(API + path, { headers: {'Content-Type':'application/json'}, ...opts });
      return r.json();
    }

    // ============ Config & Provider ============
    async function loadConfig() {
      config = await api('/config');
      $('mode').value = config.mode;
      renderProviderSelect();
    }

    function renderProviderSelect() {
      const sel = $('provider-select');
      const cur = config.selected_provider_id;
      sel.innerHTML = '<option value="">(未选择)</option>' +
        (config.providers||[]).map(p => `<option value="${p.id}" ${p.id===cur?'selected':''}>${esc(p.name)}</option>`).join('');
      $('provider-label').style.display = config.mode === 'proxy' ? 'inline-flex' : 'none';
    }

    function renderProviderList() {
      const list = $('provider-list');
      if (!config.providers || config.providers.length === 0) {
        list.innerHTML = '<div style="color:#6b7280;padding:8px">暂无 Provider，在下方添加</div>';
        return;
      }
      list.innerHTML = config.providers.map(p => `
        <div class="provider-item ${p.id===config.selected_provider_id?'selected':''}">
          <span class="name">${esc(p.name)}</span>
          <span class="url">${esc(p.base_url)}</span>
          ${p.override_model ? `<span class="tag">→${esc(p.override_model)}</span>` : ''}
          <div class="actions">
            <button class="small" onclick="selectProvider('${p.id}')">选用</button>
            <button class="small" onclick="editProvider('${p.id}')">编辑</button>
            <button class="small danger" onclick="delProvider('${p.id}')">删除</button>
          </div>
        </div>`).join('');
    }

    async function selectProvider(id) {
      config.selected_provider_id = id;
      await api('/config', { method: 'PUT', body: JSON.stringify({ mode: config.mode, selected_provider_id: id }) });
      renderProviderSelect();
      renderProviderList();
      toast('已切换 Provider');
    }

    function editProvider(id) {
      const p = config.providers.find(x => x.id === id);
      if (!p) return;
      $('prov-id').value = p.id;
      $('prov-name').value = p.name;
      $('prov-base-url').value = p.base_url;
      $('prov-api-key').value = p.api_key;
      $('prov-override-model').value = p.override_model;
      $('prov-passthrough').checked = p.passthrough_auth;
      $('provider-form-title').textContent = '编辑 Provider';
    }

    async function delProvider(id) {
      if (!confirm('删除此 Provider？')) return;
      await api('/providers/' + id, { method: 'DELETE' });
      await loadConfig();
      renderProviderList();
      toast('已删除');
    }

    async function saveProvider() {
      const data = {
        name: $('prov-name').value.trim(),
        base_url: $('prov-base-url').value.trim() || 'https://api.openai.com/v1',
        api_key: $('prov-api-key').value,
        override_model: $('prov-override-model').value.trim(),
        passthrough_auth: $('prov-passthrough').checked,
      };
      if (!data.name) { toast('请填写名称', false); return; }
      const id = $('prov-id').value;
      if (id) {
        await api('/providers/' + id, { method: 'PUT', body: JSON.stringify(data) });
      } else {
        await api('/providers', { method: 'POST', body: JSON.stringify(data) });
      }
      $('prov-id').value = '';
      $('provider-form-title').textContent = '新增 Provider';
      ['prov-name','prov-base-url','prov-api-key','prov-override-model'].forEach(k => $(k).value = '');
      $('prov-passthrough').checked = false;
      await loadConfig();
      renderProviderList();
      toast('已保存');
    }

    // ============ Request list ============
    async function loadList() {
      const items = await api('/requests');
      const list = $('list');
      if (!items || items.length === 0) { list.innerHTML = '<div class="empty">暂无请求</div>'; return; }
      list.innerHTML = items.map(it => {
        const t = new Date(it.timestamp * 1000).toLocaleTimeString('zh-CN', {hour12: false});
        return `<div class="req-item ${it.id===currentId?'active':''}" data-id="${it.id}">
          <div class="row1"><span class="model">${esc(it.model)||'-'}</span><span class="time">${t}</span></div>
          <div class="meta">
            <span class="tag ${it.response_source}">${it.response_source}</span>
            <span class="tag">${it.messages_count}msg</span>
            <span class="tag">${it.hash}</span>
            ${it.error?'<span class="tag error">err</span>':''}
            ${it.proxy_status?`<span class="tag">${it.proxy_status}</span>`:''}
          </div>
        </div>`;
      }).join('');
      list.querySelectorAll('.req-item').forEach(el => el.onclick = () => selectRecord(el.dataset.id));
    }

    // ============ Human rendering ============
    function renderContent(content) {
      if (content == null) return '';
      if (typeof content === 'string') return `<div class="msg-content">${esc(content)}</div>`;
      if (Array.isArray(content)) {
        return content.map(part => {
          if (part.type === 'text') return `<div class="msg-content">${esc(part.text || '')}</div>`;
          if (part.type === 'image_url') return `<div class="msg-content" style="color:#7dd3fc">[图片: ${esc((part.image_url?.url||'').substring(0,60))}]</div>`;
          return `<pre>${esc(JSON.stringify(part, null, 2))}</pre>`;
        }).join('');
      }
      return `<pre>${esc(JSON.stringify(content, null, 2))}</pre>`;
    }

    function renderToolCall(tc) {
      const fn = tc.function || {};
      let argsHtml;
      try {
        const parsed = JSON.parse(fn.arguments || '{}');
        argsHtml = Object.entries(parsed).map(([k, v]) =>
          `<div class="arg-row"><span class="arg-key">${esc(k)}</span>: <span class="arg-val">${esc(JSON.stringify(v))}</span></div>`
        ).join('') || '<span style="color:#6b7280">(空)</span>';
      } catch {
        argsHtml = `<pre style="margin:0">${esc(fn.arguments || '')}</pre>`;
      }
      return `<div class="tool-call-card">
        <div class="tool-call-header">
          <span>🔧</span>
          <span class="tool-call-name">${esc(fn.name || '')}</span>
          <span class="tool-call-id">${esc(tc.id || '')}</span>
        </div>
        <div style="color:#6b7280;font-size:11px;margin-bottom:2px">arguments:</div>
        ${argsHtml}
      </div>`;
    }

    // 方向箭头：system/user/tool 是发给 LLM 的（↑），assistant 是 LLM 返回的（↓）
    function dirArrow(role) {
      if (role === 'assistant') return '<span class="dir-arrow down" title="LLM 返回">↓</span>';
      return '<span class="dir-arrow up" title="发给 LLM">↑</span>';
    }

    function msgSummary(m) {
      const role = m.role || '?';
      if (m.content != null) {
        let txt = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
        if (txt.length > 60) txt = txt.substring(0, 60) + '...';
        return esc(txt);
      }
      if (m.tool_calls) return 'tool_calls: ' + m.tool_calls.map(tc => tc.function?.name).join(', ');
      return '(空)';
    }

    function renderMessage(m, i) {
      const role = m.role || '?';
      let html = `<div class="msg-card role-${role}" onclick="toggleMsg(event)">
        <div class="msg-header">
          <span class="msg-caret">▾</span>
          ${dirArrow(role)}
          <span class="role-badge role-${role}">${esc(role)}</span>
          <span class="msg-index">#${i}</span>
          <span class="msg-summary">${msgSummary(m)}</span>
        </div>
        <div class="msg-body">`;
      if (m.content != null) html += renderContent(m.content);
      if (m.tool_calls) html += m.tool_calls.map(renderToolCall).join('');
      if (m.tool_call_id) html += `<div class="tool-result-meta">tool_call_id: <code>${esc(m.tool_call_id)}</code></div>`;
      if (m.name) html += `<div class="tool-result-meta">name: <code>${esc(m.name)}</code></div>`;
      html += '</div></div>';
      return html;
    }

    function toggleMsg(e) {
      if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
      e.currentTarget.classList.toggle('collapsed');
    }

    function renderMessagesHuman(messages) {
      if (!Array.isArray(messages)) return `<pre>${esc(JSON.stringify(messages, null, 2))}</pre>`;
      return messages.map(renderMessage).join('');
    }

    function renderToolDef(tool) {
      const fn = tool.function || {};
      let paramsHtml = '';
      if (fn.parameters && fn.parameters.properties) {
        const req = new Set(fn.parameters.required || []);
        paramsHtml = Object.entries(fn.parameters.properties).map(([name, schema]) => {
          const reqTag = req.has(name) ? '<span class="param-req">必填</span>' : '';
          const type = schema.type || 'any';
          const desc = schema.description || '';
          return `<div class="param-row">
            <span class="param-name">${esc(name)}</span>
            <span class="param-type">${esc(type)}</span>
            ${reqTag}
            <span class="param-desc">${esc(desc)}</span>
          </div>`;
        }).join('');
      }
      return `<div class="tool-card">
        <div class="tool-card-name">${esc(fn.name || '')}</div>
        <div class="tool-card-desc">${esc(fn.description || '')}</div>
        ${paramsHtml ? '<div style="margin-top:4px"><div style="color:#6b7280;font-size:11px;margin-bottom:2px">Parameters:</div>' + paramsHtml + '</div>' : ''}
      </div>`;
    }

    function renderToolsHuman(tools) {
      if (!Array.isArray(tools)) return `<pre>${esc(JSON.stringify(tools, null, 2))}</pre>`;
      return tools.map(renderToolDef).join('');
    }

    function renderResponseHuman(resp) {
      if (!resp) return '<span style="color:#6b7280">(无响应)</span>';
      if (resp.error) return `<div class="error-box">⚠️ ${esc(resp.error.message || JSON.stringify(resp.error))}</div>`;
      const choice = resp.choices?.[0];
      if (!choice) return `<div style="color:#6b7280">无 choices</div>`;
      const msg = choice.message || {};
      let html = '<div class="response-card">';
      html += `<div class="msg-header"><span class="dir-arrow down" title="LLM 返回">↓</span><span class="role-badge role-assistant">assistant</span><span class="finish-reason">finish: ${esc(choice.finish_reason || '')}</span></div>`;
      if (msg.content) html += renderContent(msg.content);
      if (msg.tool_calls) html += msg.tool_calls.map(renderToolCall).join('');
      if (resp.usage) {
        const u = resp.usage;
        html += `<div class="usage">tokens: prompt=${u.prompt_tokens||0} completion=${u.completion_tokens||0} total=${u.total_tokens||0}</div>`;
      }
      html += '</div>';
      return html;
    }

    function jsonBlock(data) {
      return `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
    }

    function block(title, humanHtml, jsonData, opts={}) {
      const { extra='', collapsed=false, summary='' } = opts;
      return `<div class="block${collapsed?' collapsed':''}" data-view="human">
        <h3 onclick="toggleBlock(event)">
          <span class="caret">▾</span>
          ${title} ${extra}
          ${summary ? `<span class="block-summary">${summary}</span>` : ''}
          <button class="view-toggle small" onclick="event.stopPropagation()">查看 JSON</button>
        </h3>
        <div class="block-body">
          <div class="block-human">${humanHtml}</div>
          <div class="block-json">${jsonBlock(jsonData)}</div>
        </div>
      </div>`;
    }

    function toggleBlock(e) {
      if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
      e.currentTarget.closest('.block').classList.toggle('collapsed');
    }

    // ============ Detail ============
    async function selectRecord(id) {
      currentId = id;
      const r = await api('/requests/' + id);
      currentRecord = r;
      const d = $('detail');
      const time = new Date(r.timestamp * 1000).toLocaleString('zh-CN', {hour12: false});
      const parts = [];

      // Summary (collapsed by default)
      const model = r.body?.model;
      const summaryText = `${esc(model||'-')} · ${r.response_source}${r.error?` · err`:''}`;
      parts.push(block('请求概要',
        `<pre>${esc(JSON.stringify({
          id: r.id, hash: r.hash, time, path: r.path, method: r.method,
          model, source: r.response_source, error: r.error,
        }, null, 2))}</pre>`,
        { id: r.id, hash: r.hash, timestamp: r.timestamp, path: r.path, method: r.method,
          model, response_source: r.response_source, error: r.error },
        { collapsed: true, summary: summaryText,
          extra: `<span class="hash">${esc(r.hash)}</span><span class="tag ${r.response_source}">${r.response_source}</span>
                  <button class="small" onclick="openCustomEditor('${r.hash}')">编辑自定义响应</button>` }
      ));

      // Request params (collapsed by default)
      const params = {...(r.body||{})};
      delete params.messages;
      delete params.tools;
      const paramKeys = Object.keys(params).filter(k => params[k] != null);
      const paramsSummary = paramKeys.length ? esc(paramKeys.join(', ')) : '(无)';
      parts.push(block('请求参数', `<pre>${esc(JSON.stringify(params, null, 2))}</pre>`, params,
        { collapsed: true, summary: paramsSummary }
      ));

      // Tools (before Messages, collapsed by default)
      if (r.body?.tools) {
        const toolNames = r.body.tools.map(t => t.function?.name || '?').join(', ');
        parts.push(block(`Tools (${r.body.tools.length})`, renderToolsHuman(r.body.tools), r.body.tools,
          { collapsed: true, summary: esc(toolNames) }
        ));
      }

      // Messages (with legend)
      const msgs = r.body?.messages || [];
      const msgLegend = '<span style="font-size:10px;color:#6b7280;text-transform:none">↑ 发给 LLM · ↓ LLM 返回 · 点击消息折叠</span>';
      parts.push(block(`Messages (${msgs.length}) ${msgLegend}`, renderMessagesHuman(msgs), msgs));

      // Proxy request (collapsed by default)
      if (r.proxy_request) {
        const proxyModel = r.proxy_request.model || r.body?.model;
        parts.push(block('转发到上游的请求', `<pre>${esc(JSON.stringify(r.proxy_request, null, 2))}</pre>`, r.proxy_request,
          { collapsed: true, summary: `model: ${esc(proxyModel||'-')}` }
        ));
      }
      // Proxy response
      if (r.proxy_response) {
        parts.push(block(`上游响应 (status=${r.proxy_status})`, renderResponseHuman(r.proxy_response), r.proxy_response));
      }

      // Response
      if (r.response) {
        const respMsg = r.response.choices?.[0]?.message;
        const respSummary = respMsg?.content ? esc(String(respMsg.content).substring(0,40)) : (respMsg?.tool_calls ? 'tool_calls' : '-');
        parts.push(block('返回给客户端的响应', renderResponseHuman(r.response), r.response,
          { summary: respSummary,
            extra: `<button class="small" onclick="openCustomEditor('${r.hash}', true)">用此响应设置自定义</button>` }
        ));
      }

      d.innerHTML = parts.join('');
      d.querySelectorAll('.view-toggle').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const blk = btn.closest('.block');
          const cur = blk.dataset.view;
          blk.dataset.view = cur === 'human' ? 'json' : 'human';
          btn.textContent = blk.dataset.view === 'human' ? '查看 JSON' : '查看 Human';
        });
      });
      loadList();
    }

    // ============ Custom response ============
    let currentCustomHash = null;
    function openCustomEditor(hash, fillFromResponse=false) {
      currentCustomHash = hash;
      $('custom-hash').textContent = hash;
      api('/custom-responses').then(map => {
        const existing = map[hash];
        if (existing) $('custom-editor').value = JSON.stringify(existing, null, 2);
        else if (currentRecord?.response) $('custom-editor').value = JSON.stringify(currentRecord.response, null, 2);
        else $('custom-editor').value = JSON.stringify({
          id: 'chatcmpl-mock', object: 'chat.completion', created: Math.floor(Date.now()/1000),
          model: currentRecord?.body?.model || 'mock-model',
          choices: [{ index: 0, message: { role: 'assistant', content: '在此编辑' }, finish_reason: 'stop' }],
          usage: { prompt_tokens: 0, completion_tokens: 0, total_tokens: 0 },
        }, null, 2);
      });
      $('custom-modal').classList.add('show');
    }

    // ============ Events ============
    $('mode').onchange = async () => {
      config.mode = $('mode').value;
      await api('/config', { method: 'PUT', body: JSON.stringify({ mode: config.mode, selected_provider_id: config.selected_provider_id }) });
      renderProviderSelect();
      toast('模式: ' + config.mode);
    };

    $('provider-select').onchange = async () => {
      config.selected_provider_id = $('provider-select').value || null;
      await api('/config', { method: 'PUT', body: JSON.stringify({ mode: config.mode, selected_provider_id: config.selected_provider_id }) });
      toast('已切换 Provider');
    };

    $('manage-providers-btn').onclick = () => { renderProviderList(); $('provider-modal').classList.add('show'); };
    $('prov-cancel').onclick = () => $('provider-modal').classList.remove('show');
    $('prov-save').onclick = saveProvider;

    $('custom-cancel').onclick = () => $('custom-modal').classList.remove('show');
    $('custom-save').onclick = async () => {
      let parsed;
      try { parsed = JSON.parse($('custom-editor').value); }
      catch (e) { toast('JSON 解析失败: ' + e.message, false); return; }
      await api('/custom-responses/' + currentCustomHash, { method: 'POST', body: JSON.stringify({ response: parsed }) });
      $('custom-modal').classList.remove('show');
      toast('已保存自定义响应');
    };
    $('custom-delete').onclick = async () => {
      await api('/custom-responses/' + currentCustomHash, { method: 'DELETE' });
      $('custom-modal').classList.remove('show');
      toast('已删除');
    };
    $('custom-fill-mock').onclick = () => {
      if (currentRecord?.response) $('custom-editor').value = JSON.stringify(currentRecord.response, null, 2);
    };

    $('refresh-btn').onclick = loadList;
    $('clear-btn').onclick = async () => {
      if (!confirm('清空所有请求记录？')) return;
      await api('/requests', { method: 'DELETE' });
      currentId = null; currentRecord = null;
      $('detail').innerHTML = '<div class="empty">已清空</div>';
      loadList();
    };
    $('auto-refresh').onchange = () => {
      if (timer) { clearInterval(timer); timer = null; }
      if ($('auto-refresh').checked) timer = setInterval(loadList, 2000);
    };

    // Init
    loadConfig();
    loadList();
    timer = setInterval(loadList, 2000);
  </script>
</body>
</html>
